<div class="board-shell">
  <div
    class="board-wrapper"
    data-testid="game-board"
    tabindex="0"
    role="grid"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-rowcount]="boardSize()"
    [attr.aria-colcount]="boardSize()"
    [attr.aria-activedescendant]="activePointId()"
    [attr.aria-readonly]="!interactive()"
    (keydown)="onKeyDown($event)"
    (mouseleave)="clearHover()"
  >
    <svg
      class="board-surface"
      [attr.viewBox]="'0 0 ' + boardPixels() + ' ' + boardPixels()"
      preserveAspectRatio="xMidYMid meet"
      (mousemove)="onBoardPointerMove($event)"
      (pointerup)="onBoardClick($event)"
    >
      <defs>
        <radialGradient id="stone-black" cx="30%" cy="28%">
          <stop offset="0%" stop-color="#6b7280" />
          <stop offset="100%" stop-color="#09090b" />
        </radialGradient>
        <radialGradient id="stone-white" cx="28%" cy="22%">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#d6d3d1" />
        </radialGradient>
      </defs>

      <rect
        x="18"
        y="18"
        [attr.width]="boardPixels() - 36"
        [attr.height]="boardPixels() - 36"
        rx="32"
        fill="rgba(228, 195, 126, 0.95)"
      />

      @for (position of linePositions(); track position) {
        <line
          [attr.x1]="linePositions()[0]"
          [attr.x2]="linePositions()[linePositions().length - 1]"
          [attr.y1]="position"
          [attr.y2]="position"
          stroke="rgba(68, 45, 23, 0.72)"
          stroke-width="2"
        />
        <line
          [attr.x1]="position"
          [attr.x2]="position"
          [attr.y1]="linePositions()[0]"
          [attr.y2]="linePositions()[linePositions().length - 1]"
          stroke="rgba(68, 45, 23, 0.72)"
          stroke-width="2"
        />
      }

      @for (point of starPoints(); track pointKey(point)) {
        <circle
          [attr.cx]="x(point)"
          [attr.cy]="y(point)"
          r="5"
          fill="rgba(51, 36, 20, 0.85)"
          pointer-events="none"
        />
      }

      @for (row of pointRows(); track $index; let rowIndex = $index) {
        <g role="row" [attr.aria-rowindex]="rowIndex + 1">
          @for (point of row; track pointKey(point)) {
            <g
              [attr.id]="pointId(point)"
              role="gridcell"
              tabindex="-1"
              [attr.data-testid]="dataTestId(point)"
              [attr.data-point]="pointKey(point)"
              [attr.aria-label]="pointAriaLabel(point)"
              [attr.aria-rowindex]="point.y + 1"
              [attr.aria-colindex]="point.x + 1"
              [attr.aria-selected]="isKeyboardPoint(point)"
              [attr.aria-disabled]="!interactive() || isPointDisabled(point)"
            >
              <circle
                [attr.cx]="x(point)"
                [attr.cy]="y(point)"
                r="22"
                fill="transparent"
              />

              @if (hasStone(point)) {
                <circle
                  [attr.cx]="x(point)"
                  [attr.cy]="y(point)"
                  [attr.r]="stoneRadius()"
                  [attr.fill]="
                    stoneColor(point) === 'black'
                      ? 'url(#stone-black)'
                      : 'url(#stone-white)'
                  "
                  [attr.stroke]="
                    stoneColor(point) === 'black' ? '#09090b' : '#e7e5e4'
                  "
                  stroke-width="2"
                  pointer-events="none"
                />
              }

              @if (isDeadStone(point)) {
                <g
                  stroke="#f97316"
                  stroke-width="3"
                  stroke-linecap="round"
                  pointer-events="none"
                >
                  <line
                    [attr.x1]="x(point) - 12"
                    [attr.y1]="y(point) - 12"
                    [attr.x2]="x(point) + 12"
                    [attr.y2]="y(point) + 12"
                  />
                  <line
                    [attr.x1]="x(point) + 12"
                    [attr.y1]="y(point) - 12"
                    [attr.x2]="x(point) - 12"
                    [attr.y2]="y(point) + 12"
                  />
                </g>
              }

              @if (lastMove() && pointEquals(lastMove(), point)) {
                <circle
                  [attr.cx]="x(point)"
                  [attr.cy]="y(point)"
                  r="5"
                  [attr.fill]="
                    stoneColor(point) === 'black' ? '#fef3c7' : '#1f2937'
                  "
                  pointer-events="none"
                />
              }

              @if (isWinningPoint(point)) {
                <circle
                  [attr.cx]="x(point)"
                  [attr.cy]="y(point)"
                  r="28"
                  fill="none"
                  stroke="#38bdf8"
                  stroke-width="4"
                  stroke-dasharray="6 6"
                  pointer-events="none"
                />
              }

              @if (isKeyboardPoint(point)) {
                <circle
                  [attr.cx]="x(point)"
                  [attr.cy]="y(point)"
                  r="18"
                  fill="none"
                  stroke="#f97316"
                  stroke-width="2"
                  pointer-events="none"
                />
              }
            </g>
          }
        </g>
      }

      @if (ghostPoint()) {
        <circle
          [attr.cx]="x(ghostPoint()!)"
          [attr.cy]="y(ghostPoint()!)"
          [attr.r]="stoneRadius() - 2"
          [attr.fill]="
            currentPlayer() === 'black'
              ? 'rgba(9, 9, 11, 0.35)'
              : 'rgba(255, 255, 255, 0.6)'
          "
          [attr.stroke]="currentPlayer() === 'black' ? '#1f2937' : '#e7e5e4'"
          stroke-width="2"
          pointer-events="none"
        />
      }
    </svg>

    <lib-go-board-coordinates [boardSize]="boardSize()" />
  </div>
</div>
