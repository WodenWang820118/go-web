<aside
  class="go-hosted-panel-dark go-hosted-scroll flex h-full min-h-full flex-col gap-3 p-3"
  data-testid="room-sidebar"
>
  @if (roomMessages().length > 0) {
    <lib-go-online-room-sidebar-messages [messages]="roomMessages()" />
  }

  @if (!participantId()) {
    <lib-go-online-room-sidebar-identity-panel
      [joinForm]="joinForm()"
      [joining]="joining()"
      [joinCardTitle]="joinCardTitle()"
      [joinCardDescription]="joinCardDescription()"
      (joinRequested)="joinRequested.emit()"
    />
  }

  <lib-go-online-room-sidebar-seats-panel
    [seats]="seats()"
    [match]="match()"
    [canChangeSeats]="canChangeSeats()"
    [realtimeConnected]="realtimeConnected()"
    (claimSeatRequested)="claimSeatRequested.emit($event)"
    (releaseSeatRequested)="releaseSeatRequested.emit()"
  />

  @if (showRematch()) {
    <lib-go-online-room-sidebar-rematch-panel
      [canRespondToRematch]="canRespondToRematch()"
      [rematchStatuses]="rematchStatuses()"
      (acceptRematchRequested)="acceptRematchRequested.emit()"
      (declineRematchRequested)="declineRematchRequested.emit()"
    />
  }

  <lib-go-online-room-sidebar-chat-panel
    [chatForm]="chatForm()"
    [participantId]="participantId()"
    [isMuted]="isMuted()"
    [realtimeConnected]="realtimeConnected()"
    [participants]="participants()"
    [messages]="messages()"
    [helperText]="helperText()"
    (sendRequested)="sendRequested.emit()"
  />

  <lib-go-online-room-sidebar-actions
    [match]="match()"
    [canPass]="canPass()"
    [canResign]="canResign()"
    [realtimeConnected]="realtimeConnected()"
    (passRequested)="passRequested.emit()"
    (resignRequested)="resignRequested.emit()"
  />
</aside>
