<section
  class="room-shell min-h-dvh bg-[radial-gradient(circle_at_top_left,_rgba(33,58,74,0.55),_transparent_34%),radial-gradient(circle_at_bottom_right,_rgba(103,74,28,0.25),_transparent_28%),linear-gradient(180deg,_#0f1821,_#070b11_70%)] text-stone-100"
>
  <lib-go-online-room-page-dialogs
    [autoStartVisible]="presenter.dialogs.autoStartDialogVisible()"
    [autoStartMessage]="presenter.dialogs.autoStartDialogMessage()"
    [rematchVisible]="presenter.dialogs.rematchDialogVisible()"
    [canRespondToRematch]="presenter.view.canRespondToRematch()"
    [rematchStatuses]="presenter.view.rematchStatuses()"
    [resignVisible]="presenter.dialogs.resignResultDialogVisible()"
    [resignMessage]="presenter.dialogs.resignResultMessage()"
    (autoStartDismissed)="presenter.dialogs.dismissAutoStartDialog()"
    (rematchDismissed)="presenter.dialogs.dismissRematchDialog()"
    (rematchAccepted)="presenter.dialogs.acceptRematch()"
    (rematchDeclined)="presenter.dialogs.declineRematch()"
    (resignDismissed)="presenter.dialogs.dismissResignResultDialog()"
  />

  @if (presenter.view.bootstrapState() === 'missing') {
    <lib-go-online-room-page-status
      [eyebrow]="presenter.view.missingStatusView().eyebrow"
      [title]="presenter.view.missingStatusView().title"
      [description]="presenter.view.missingStatusView().description"
      [actionLabel]="presenter.view.missingStatusView().actionLabel"
      [backLabel]="presenter.view.i18n.t('room.page.back_to_lobby')"
      backTestId="room-fallback-back"
      actionTestId="room-fallback-action"
    />
  } @else if (presenter.view.bootstrapState() === 'loading' || !presenter.view.snapshot()) {
    <lib-go-online-room-page-status
      [eyebrow]="presenter.view.loadingStatusView().eyebrow"
      [title]="presenter.view.loadingStatusView().title"
      [description]="presenter.view.loadingStatusView().description"
      [actionLabel]="presenter.view.loadingStatusView().actionLabel"
      [backLabel]="presenter.view.i18n.t('room.page.back_to_lobby')"
      backTestId="room-loading-back"
    />
  } @else {
    <div class="room-layout go-safe-page grid gap-3" data-testid="room-layout">
      <lib-go-online-room-stage-section
        [match]="presenter.view.match()"
        [roomStage]="presenter.view.roomStage()"
        [boardSection]="presenter.view.boardSection()"
        [shareChip]="presenter.share.shareChip()"
        (pointSelected)="presenter.interactions.onBoardPoint($event)"
        (copyRequested)="presenter.share.copyShareUrl()"
        (manualFallbackDismissed)="presenter.share.dismissShareCopyManualFallback()"
      />

      <lib-go-online-room-sidebar
        [joinForm]="presenter.interactions.joinForm"
        [chatForm]="presenter.interactions.chatForm"
        [participantId]="presenter.view.onlineRoom.participantId()"
        [joining]="presenter.view.onlineRoom.joining()"
        [isMuted]="presenter.view.onlineRoom.isMuted()"
        [realtimeConnected]="presenter.view.realtimeConnected()"
        [canChangeSeats]="presenter.view.onlineRoom.canChangeSeats()"
        [joinCardTitle]="presenter.view.joinCardTitle()"
        [joinCardDescription]="presenter.view.joinCardDescription()"
        [seats]="presenter.view.seats()"
        [participants]="presenter.view.participants()"
        [match]="presenter.view.match()"
        [messages]="presenter.view.onlineRoom.chat()"
        [helperText]="presenter.view.chatHelperText()"
        [roomMessages]="presenter.view.roomMessages()"
        [canPass]="presenter.view.canPass()"
        [canResign]="presenter.view.canResign()"
        [showRematch]="false"
        [canRespondToRematch]="presenter.view.canRespondToRematch()"
        [rematchStatuses]="presenter.view.rematchStatuses()"
        (joinRequested)="presenter.interactions.joinRoom()"
        (claimSeatRequested)="presenter.interactions.claimSeat($event)"
        (releaseSeatRequested)="presenter.interactions.releaseSeat()"
        (passRequested)="presenter.interactions.passTurn()"
        (resignRequested)="presenter.interactions.resign()"
        (acceptRematchRequested)="presenter.dialogs.acceptRematch()"
        (declineRematchRequested)="presenter.dialogs.declineRematch()"
        (sendRequested)="presenter.interactions.sendChat()"
      />
    </div>
  }
</section>
