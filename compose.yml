services:
  api:
    image: gx-go-server:latest
    build:
      context: .
      dockerfile: apps/go-server/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gx-go
    restart: unless-stopped

  web:
    image: gx-go-web:latest
    build:
      context: .
      dockerfile: apps/go-web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gx-go
    ports:
      - '8080:80'
    restart: unless-stopped

networks:
  gx-go:
    driver: bridge
